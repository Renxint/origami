<!DOCTYPE html>
<html lang="zh-CN" data-theme="soft-dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Origami</title>
<link rel="stylesheet" href="../css/themes.css">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; background:var(--bg-deep);
    color:var(--text-primary); font-family:var(--font);
    font-size:13px; -webkit-font-smoothing:antialiased;
    user-select:none; overflow:hidden;
  }
  .app { width:100%; height:100%; display:flex; flex-direction:column; padding:0 20px; }

  /* ── 顶栏 ── */
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 0; flex-shrink:0; }
  .topbar-brand { font-size:17px; font-weight:700; color:var(--text-primary); }
  .topbar-version { font-size:10px; color:var(--text-disabled); }
  .topbar-divider { height:1px; background:var(--divider); flex-shrink:0; }

  /* ── 标题 ── */
  .hero { text-align:center; padding:32px 0 24px; flex-shrink:0; }
  .hero-title { font-size:18px; font-weight:700; color:var(--text-primary); margin-bottom:4px; }
  .hero-sub { font-size:12px; color:var(--text-secondary); }

  /* ── 卡片 ── */
  .cards { display:flex; gap:14px; justify-content:center; flex-shrink:0; padding:0 12px; }
  .card {
    flex:1; max-width:120px; aspect-ratio:0.85; border-radius:14px; border:2px solid var(--border-default);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; padding:20px 10px; cursor:pointer;
    transition:border-color .2s, background .2s, transform .15s;
    text-align:center; outline:none;
  }
  .card .icon img { width:40px; height:40px; display:block; }
  .card .name { font-size:14px; font-weight:700; }
  .card .hint { font-size:10px; color:var(--text-disabled); }
  .card:hover { transform:translateY(-2px); }

  /* 可用 */
  .card.on {
    background:var(--bg-hover); border-color:var(--accent);
    color:var(--accent);
  }
  .card.on:hover { background:var(--bg-card); border-color:var(--accent-hover); }
  .card.on .icon { color:var(--accent); }

  /* 未开放 */
  .card.off {
    background:var(--bg-card); border-color:var(--border-default);
    color:var(--text-disabled); cursor:default; opacity:.7;
  }
  .card.off:hover { border-color:var(--accent); color:var(--text-secondary); }

  /* ── 底栏 ── */
  .spacer { flex:1; }
  .foot-divider { height:1px; background:var(--divider); flex-shrink:0; }
  .foot { display:flex; align-items:center; justify-content:space-between; padding:12px 0 16px; flex-shrink:0; }
  .foot-status { font-size:11px; color:var(--text-secondary); }
  .foot-btn {
    background:transparent; color:var(--text-secondary); border:1px solid transparent;
    border-radius:8px; padding:5px 16px; font-size:11px; cursor:pointer;
    transition:background .2s, color .2s; font-family:var(--font); outline:none;
  }
  .foot-btn:hover { background:var(--bg-hover); color:var(--text-primary); }

  /* 动画 */
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .topbar{animation:fadeUp .4s ease both}
  .topbar-divider{animation:fadeUp .4s .05s ease both}
  .hero{animation:fadeUp .4s .1s ease both}
  .card:nth-child(1){animation:fadeUp .4s .16s ease both}
  .card:nth-child(2){animation:fadeUp .4s .22s ease both}
  .foot-divider{animation:fadeUp .4s .28s ease both}
  .foot{animation:fadeUp .4s .32s ease both}
</style>
</head>
<body>
<div class="app">
  <!-- 顶栏 -->
  <div class="topbar">
    <span class="topbar-brand">Origami</span>
    <span class="topbar-version" id="versionBadge">v0</span>
  </div>
  <div class="topbar-divider"></div>

  <!-- 标题 -->
  <div class="hero">
    <div class="hero-title">选择平台</div>
    <div class="hero-sub">选一个开始</div>
  </div>

  <!-- 平台卡片 -->
  <div class="cards">
    <button class="card on" onclick="selectPlatform('douyin')">
      <span class="icon"><img src="../assets/icons/douyin.png" alt="抖音"></span>
      <span class="name">抖音</span>
    </button>
    <button class="card off" disabled>
      <span class="icon"><img src="../assets/icons/bilibili.png" alt="B站"></span>
      <span class="name">B站</span>
      <span class="hint">即将上线</span>
    </button>
  </div>

  <div class="spacer"></div>

  <!-- 底栏 -->
  <div class="foot-divider"></div>
  <div class="foot">
    <span class="foot-status" id="loginStatus" onclick="doLogin()" style="cursor:pointer;">未登录 · 点击登录</span>
    <button class="foot-btn" onclick="openSettings()">设置</button>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  // 检测运行环境
  var isDesktop = typeof window.pywebview !== 'undefined';

  async function doLogin() {
    document.getElementById('loginStatus').textContent = '正在打开登录窗口...';

    if (isDesktop) {
      // pywebview 桌面模式：JS→Python 桥
      try {
        var result = await window.pywebview.api.login();
        if (result && result.ok) {
          location.reload();
        } else {
          document.getElementById('loginStatus').textContent = '登录超时 · 点击重试';
        }
      } catch(e) {
        document.getElementById('loginStatus').textContent = '登录失败 · 点击重试';
      }
    } else {
      // 浏览器模式：HTTP API
      try {
        var r = await Origami.login();
        if (r.ok) location.reload();
        else document.getElementById('loginStatus').textContent = r.message || '登录失败';
      } catch(e) {
        document.getElementById('loginStatus').textContent = '服务未启动';
      }
    }
  }

  // 加载版本号 + 登录状态
  (async function() {
    try {
      var v = await Origami.version();
      document.getElementById('versionBadge').textContent = 'v' + v.version;
    } catch(e) {}

    try {
      var cs = await Origami.cookieStatus();
      var el = document.getElementById('loginStatus');
      if (cs.ok) {
        el.textContent = '已登录';
        el.style.color = 'var(--success)';
        el.style.cursor = 'default';
        el.onclick = null;
      }
    } catch(e) {}
  })();

  function selectPlatform(id) {
    if (id === 'douyin') window.location.href = 'mode.html';
  }

  function openSettings() {
    window.location.href = 'settings.html';
  }
</script>
</body>
</html>
