<!DOCTYPE html>
<html lang="zh-CN" data-theme="soft-dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Origami</title>
<link rel="stylesheet" href="../css/themes.css">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; background:var(--bg-deep);
    color:var(--text-primary); font-family:var(--font);
    font-size:13px; -webkit-font-smoothing:antialiased;
    user-select:none; overflow:hidden;
  }
  .app { width:100%; height:100%; display:flex; flex-direction:column; padding:0 20px; }

  .topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 0; flex-shrink:0; }
  .topbar-brand { font-size:17px; font-weight:700; color:var(--text-primary); }
  .topbar-version { font-size:10px; color:var(--text-disabled); }
  .topbar-divider { height:1px; background:var(--divider); flex-shrink:0; }

  .hero { text-align:center; padding:36px 0 28px; flex-shrink:0; }
  .hero-title { font-size:18px; font-weight:700; color:var(--text-primary); margin-bottom:4px; }
  .hero-sub { font-size:12px; color:var(--text-secondary); }

  .cards { display:flex; gap:10px; justify-content:center; flex-shrink:0; padding:0 8px; }
  .card {
    width:80px; min-height:88px; border-radius:14px; border:2px solid var(--border-default);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:6px; padding:14px 6px; cursor:pointer;
    transition:border-color .2s, background .2s, transform .15s;
    text-align:center; outline:none;
  }
  .card .icon img { width:30px; height:30px; display:block; }
  .card .name { font-size:12px; font-weight:700; }
  .card .hint { font-size:9px; color:var(--text-disabled); }
  .card:hover { transform:translateY(-2px); }

  .card.on { background:var(--bg-hover); border-color:var(--accent); color:var(--accent); }
  .card.on:hover { border-color:var(--accent-hover); }

  .card.off { background:var(--bg-card); border-color:var(--border-default); color:var(--text-disabled); opacity:.7; }
  .card.off:hover { opacity:.85; border-color:var(--accent); }

  .spacer { flex:1; }
  .foot-divider { height:1px; background:var(--divider); flex-shrink:0; }
  .foot { display:flex; align-items:center; justify-content:space-between; padding:12px 0 16px; flex-shrink:0; }
  .foot-status { font-size:11px; color:var(--text-secondary); }
  .foot-btn {
    background:transparent; color:var(--text-secondary); border:1px solid transparent;
    border-radius:8px; padding:5px 16px; font-size:11px; cursor:pointer;
    transition:background .2s, color .2s; font-family:var(--font); outline:none;
  }
  .foot-btn:hover { background:var(--bg-hover); color:var(--text-primary); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .topbar{animation:fadeUp .4s ease both}
  .topbar-divider{animation:fadeUp .4s .05s ease both}
  .hero{animation:fadeUp .4s .1s ease both}
  .card:nth-child(1){animation:fadeUp .4s .16s ease both}
  .card:nth-child(2){animation:fadeUp .4s .22s ease both}
  .foot-divider{animation:fadeUp .4s .28s ease both}
  .foot{animation:fadeUp .4s .32s ease both}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <span class="topbar-brand">Origami</span>
    <span class="topbar-version">v0</span>
  </div>
  <div class="topbar-divider"></div>

  <div class="hero">
    <div class="hero-title">选择平台</div>
    <div class="hero-sub">选一个开始</div>
  </div>

  <div class="cards">
    <button class="card on" onclick="selectPlatform('douyin')">
      <span class="icon"><img src="../assets/icons/douyin.png" alt="抖音"></span>
      <span class="name">抖音</span>
    </button>
    <button class="card off" disabled>
      <span class="icon"><img src="../assets/icons/bilibili.png" alt="B站" style="opacity:.5;"></span>
      <span class="name">B站</span>
      <span class="hint">即将上线</span>
    </button>
  </div>

  <div class="spacer"></div>

  <div class="foot-divider"></div>
  <div class="foot">
    <span class="foot-status" style="cursor:pointer;" title="点击登录">未登录</span>
    <button class="foot-btn" onclick="openSettings()">设置</button>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  async function doLogin() {
    if (window.pywebview && window.pywebview.api) {
      var r = await window.pywebview.api.startLogin();
      if (r && r.ok) location.reload();
      return;
    }
    try { var r2 = await Origami.login(); if (r2.ok) location.reload(); } catch(e) {}
  }

  window.addEventListener('DOMContentLoaded', async function() {
    await new Promise(r => setTimeout(r, 500));
    try {
      var v = await Origami.version();
      document.querySelector('.topbar-version').textContent = 'v' + v.version;
      var cs = await Origami.cookieStatus();
      if (cs.ok) {
        var el = document.querySelector('.foot-status');
        el.textContent = '已登录';
        el.style.color = 'var(--success)';
        el.style.cursor = 'default';
        el.onclick = null;
      }
    } catch(e) {}
  });

  document.querySelector('.foot-status').addEventListener('click', doLogin);
  function selectPlatform(id) { if (id === 'douyin') location.href = 'mode.html'; }
  function openSettings() { location.href = 'settings.html'; }
</script>
</body>
</html>
