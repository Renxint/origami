name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Node deps
        run: cd sign-server && npm install && cd ..

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Get version
        id: version
        run: |
          $ver = (Get-Content version.json | ConvertFrom-Json).version
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build installer
        run: python build.py --installer

      - name: Upload setup.exe
        uses: actions/upload-artifact@v4
        with:
          name: Origami_v${{ steps.version.outputs.VERSION }}_setup
          path: dist_out/Origami_v${{ steps.version.outputs.VERSION }}_setup.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Origami v${{ steps.version.outputs.VERSION }}
          body: "自动构建发布。详见 [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)"
          files: dist_out/Origami_v${{ steps.version.outputs.VERSION }}_setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
