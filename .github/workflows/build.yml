name: Build and Sign Origami

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-sign:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          cd sign-server && npm install && cd ..

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content version.json | ConvertFrom-Json).version
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Build installer + webengine.zip
        shell: cmd
        run: python build.py --installer --zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Origami v${{ steps.version.outputs.VERSION }}
          body: "未签名版本。组件包 webengine.zip 供后续签名版使用。CHANGELOG: https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md"
          files: |
            dist_out/Origami_v*_setup.exe
            dist_out/webengine.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload webengine.zip to Release
        shell: bash
        run: gh release upload v${{ steps.version.outputs.VERSION }} dist_out/webengine.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
