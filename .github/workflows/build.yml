name: Build, Sign & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-sign-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          cd sign-server && npm install && cd ..
      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y
      - name: Get version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content version.json | ConvertFrom-Json).version
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
      - name: Build installer
        run: python build.py --installer
      - name: Upload (unsigned)
        id: up
        uses: actions/upload-artifact@v4
        with:
          name: Origami-unsigned
          path: dist_out/Origami_v*_setup.exe
          if-no-files-found: error
      - name: SignPath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ vars.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: 'origami'
          signing-policy-slug: 'test-signing'
          artifact-configuration-slug: 'default'
          github-artifact-id: '${{ steps.up.outputs.artifact-id }}'
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 600
          output-artifact-directory: './signed'
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Origami v${{ steps.version.outputs.VERSION }}
          body: "Signed release. [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)"
          files: ./signed/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
