name: Build and Sign Origami

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-sign:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          cd sign-server && npm install && cd ..

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content version.json | ConvertFrom-Json).version
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Build installers (light + webengine.zip)
        shell: cmd
        run: python build.py --installer --light

      - name: Submit light installer to SignPath
        id: signpath
        continue-on-error: true
        shell: pwsh
        env:
          SIGNPATH_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORG_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $ErrorActionPreference = 'Stop'
          $orgId = $env:SIGNPATH_ORG_ID
          $token = $env:SIGNPATH_TOKEN
          $version = $env:VERSION
          $file = Get-Item dist_out/Origami_v*_setup.exe | Select-Object -First 1

          Write-Host "Submitting $($file.Name) to SignPath REST API..."

          $submitUri = "https://app.signpath.io/API/v1/$orgId/SigningRequests/SubmitWithArtifact"
          $form = @{
            ProjectSlug = 'origami'
            SigningPolicySlug = 'release-signing'
            Artifact = $file
            Description = "Origami v$version"
          }

          try {
            $submitResp = Invoke-RestMethod -Uri $submitUri `
              -Method Post `
              -Headers @{ Authorization = "Bearer $token" } `
              -Form $form `
              -ResponseHeadersVariable respHeaders `
              -StatusCodeVariable statusCode
          } catch {
            Write-Host "Submit failed: $($_.Exception.Message)"
            if ($_.Exception.Response) {
              $body = (New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream())).ReadToEnd()
              Write-Host "Response body: $body"
            }
            throw
          }

          if ($statusCode -ne 201) {
            Write-Error "Expected 201 Created, got $statusCode"
            exit 1
          }

          $requestUrl = $respHeaders['Location'][0]
          Write-Host "Signing request created: $requestUrl"

          # Poll for completion
          $maxWait = 600
          $elapsed = 0
          $pollInterval = 10
          do {
            Start-Sleep -Seconds $pollInterval
            $elapsed += $pollInterval
            $statusResp = Invoke-RestMethod -Uri $requestUrl -Headers @{ Authorization = "Bearer $token" }
            $statusVal = $statusResp.status
            Write-Host "[${elapsed}s] Status: $statusVal"
            if ($statusVal -eq 'Failed' -or $statusVal -eq 'Canceled') {
              Write-Error "Signing ended with status: $statusVal"
              exit 1
            }
          } while ($statusVal -ne 'Completed' -and $elapsed -lt $maxWait)

          if ($statusVal -ne 'Completed') {
            Write-Error "Signing timed out after ${maxWait}s"
            exit 1
          }

          # Download signed artifact
          New-Item -ItemType Directory -Force -Path ./signed | Out-Null
          $signedPath = "./signed/$($file.Name)"
          Invoke-RestMethod -Uri "$requestUrl/SignedArtifact" `
            -Headers @{ Authorization = "Bearer $token" } `
            -OutFile $signedPath

          Write-Host "Signed artifact saved: $signedPath"

      - name: Upload signed artifact (if available)
        uses: actions/upload-artifact@v4
        with:
          name: Origami-signed
          path: ./signed/
          if-no-files-found: ignore

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Origami v${{ steps.version.outputs.VERSION }}
          body: "轻量版需首次启动下载浏览器组件。组件包 webengine.zip 见附件。"
          files: |
            dist_out/Origami_v*_setup.exe
            dist_out/webengine.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload webengine.zip to Release
        shell: bash
        run: gh release upload v${{ steps.version.outputs.VERSION }} dist_out/webengine.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
